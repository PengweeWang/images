name: Publish Images

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - master
    paths:
      - src/**
      - .github/workflows/publish-images.yml
  workflow_dispatch:

jobs:
  detect-images:
    name: Detect Changed Images
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.detect.outputs.build_matrix }}
      image_matrix: ${{ steps.detect.outputs.image_matrix }}
      has_images: ${{ steps.detect.outputs.has_images }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed image directories
        id: detect
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          python3 <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          src_root = pathlib.Path("src")
          event_name = os.environ["GITHUB_EVENT_NAME"]
          before = os.environ.get("GITHUB_EVENT_BEFORE", "")
          sha = os.environ["GITHUB_SHA"]

          def all_image_dirs():
              return sorted({dockerfile.parent.as_posix() for dockerfile in src_root.rglob("Dockerfile")})

          def nearest_image_dir(path_text: str):
              current = pathlib.Path(path_text).parent
              for candidate in (current, *current.parents):
                  try:
                      candidate.relative_to(src_root)
                  except ValueError:
                      continue
                  if (candidate / "Dockerfile").is_file():
                      return candidate.as_posix()
              return None

          if event_name == "workflow_dispatch":
              image_dirs = all_image_dirs()
          else:
              if before and before != "0000000000000000000000000000000000000000":
                  command = ["git", "diff", "--name-only", f"{before}..{sha}", "--", "src"]
              else:
                  command = ["git", "ls-files", "src"]

              changed_paths = subprocess.check_output(command, text=True).splitlines()
              discovered = []
              seen = set()
              for changed_path in changed_paths:
                  image_dir = nearest_image_dir(changed_path)
                  if image_dir and image_dir not in seen:
                      seen.add(image_dir)
                      discovered.append(image_dir)
              image_dirs = sorted(discovered)

          image_matrix = []
          build_matrix = []
          for image_dir in image_dirs:
              image_entry = {
                  "image": pathlib.PurePosixPath(image_dir).relative_to("src").as_posix().replace("/", "-"),
                  "context": image_dir,
                  "dockerfile": f"{image_dir}/Dockerfile",
              }
              image_matrix.append(image_entry)
              build_matrix.extend(
                  [
                      {
                          **image_entry,
                          "platform": "linux/amd64",
                          "platform_id": "amd64",
                          "runner": "ubuntu-24.04",
                      },
                      {
                          **image_entry,
                          "platform": "linux/arm64",
                          "platform_id": "arm64",
                          "runner": "ubuntu-24.04-arm",
                      },
                  ]
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"build_matrix={json.dumps(build_matrix)}", file=output)
              print(f"image_matrix={json.dumps(image_matrix)}", file=output)
              print(f"has_images={'true' if image_matrix else 'false'}", file=output)
          PY

  build-and-push:
    name: Build And Push (${{ matrix.image }} ${{ matrix.platform_id }})
    runs-on: ${{ matrix.runner }}
    needs: detect-images
    if: needs.detect-images.outputs.has_images == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-images.outputs.build_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive registry coordinates
        id: registry
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner}/${{ matrix.image }}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.image }}
          outputs: type=image,name=${{ steps.registry.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform_id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform_id }}

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests/${{ matrix.image }}
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${{ matrix.image }}/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform_id }}
          path: /tmp/digests/${{ matrix.image }}/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: Merge Manifests (${{ matrix.image }})
    runs-on: ubuntu-24.04
    needs:
      - detect-images
      - build-and-push
    if: needs.detect-images.outputs.has_images == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-images.outputs.image_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive registry coordinates
        id: registry
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner}/${{ matrix.image }}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.image }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.image }}-*
          path: /tmp/digests/${{ matrix.image }}
          merge-multiple: true

      - name: Create manifest list
        working-directory: /tmp/digests/${{ matrix.image }}
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          args=()
          while IFS= read -r tag; do
            args+=("-t" "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          while IFS= read -r digest; do
            args+=("${{ steps.registry.outputs.image }}@sha256:${digest}")
          done < <(find . -maxdepth 1 -type f -printf '%f\n' | sort)
          docker buildx imagetools create "${args[@]}"

      - name: Inspect merged image
        working-directory: /tmp/digests/${{ matrix.image }}
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          first_tag=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools inspect "$first_tag"